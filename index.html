<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Audio Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 1.75rem;
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .dot.listening { background: #e74c3c; animation: pulse 1.2s infinite; }
    .dot.playing   { background: #1abc9c; animation: pulse 0.8s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    #statusText {
      font-size: 14px;
      font-weight: 600;
      color: #555;
    }

    /* Transcript box */
    #transcript {
      background: #f7f8fa;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 14px;
      color: #333;
      min-height: 40px;
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    #nowplaying {
      font-size: 12px;
      font-weight: 600;
      color: #1abc9c;
      min-height: 18px;
      margin-bottom: 1.25rem;
    }

    /* Start button */
    #startBtn {
      background: #3498db;
      color: #fff;
      border: none;
      padding: 11px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 1.75rem;
    }
    #startBtn:hover:not(:disabled) { background: #2980b9; }
    #startBtn:active:not(:disabled) { transform: scale(0.97); }
    #startBtn:disabled { background: #bdc3c7; cursor: not-allowed; }

    /* Commands list */
    .commands-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin-bottom: 0.6rem;
    }

    .commands {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .cmd-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: #eef2ff;
      color: #3d5af1;
      font-weight: 500;
      border: 1px solid #d8dfff;
    }

    .note {
      margin-top: 1.5rem;
      font-size: 11px;
      color: #bbb;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🎤 Voice Audio Player</h1>
  <p class="subtitle">Always listening — mic never stops</p>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Off</span>
  </div>

  <div id="transcript">Say a keyword to play a sound...</div>
  <div id="nowplaying"></div>

  <button id="startBtn" onclick="initVoice()">Start Listening</button>

  <div class="commands-label">Voice Commands</div>
  <div class="commands">
    <span class="cmd-badge">dj</span>
    <span class="cmd-badge">lakhan</span>
    <span class="cmd-badge">fat gaya</span>
    <span class="cmd-badge">achcha</span>
    <span class="cmd-badge">bjp</span>
  </div>

  <p class="note">
    Put your audio files in an <code>audio/</code> folder next to this file.<br>
    Must run on localhost or HTTPS for mic to work.
  </p>
</div>

<audio id="audioPlayer"></audio>

<script>
  /* ── Audio commands map ─────────────────────────────────────── */
  const commands = {
    "aniket"       : "./chicken-on-tree-screaming.mp3",
    "lakhan"   : "./modi-ji-bhojyam.mp3",
    "dilkhush" : "./kya-cheda-bhosdi.mp3",
    "achcha"   : "./kyu-re-madarchod-cid.mp3",
    "sir"      : "./modi-ji-wah.mp3"
  };
  const defaultAudio = "audio/faaah.mp3";

  /* ── DOM refs ────────────────────────────────────────────────── */
  const dot        = document.getElementById("dot");
  const statusText = document.getElementById("statusText");
  const transcript = document.getElementById("transcript");
  const nowplaying = document.getElementById("nowplaying");
  const startBtn   = document.getElementById("startBtn");
  const player     = document.getElementById("audioPlayer");

  /* ── State ───────────────────────────────────────────────────── */
  let recognition   = null;
  let isPlaying     = false;
  let started       = false;
  let restartTimer  = null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  /* ── UI helpers ──────────────────────────────────────────────── */
  function setListening() {
    dot.className       = "dot listening";
    statusText.textContent = "Listening...";
    statusText.style.color = "#e74c3c";
    nowplaying.textContent = "";
  }

  function setPlaying(label) {
    dot.className       = "dot playing";
    statusText.textContent = "Playing audio";
    statusText.style.color = "#1abc9c";
    nowplaying.textContent = label ? "▶ " + label : "▶ default";
  }

  function setIdle(msg) {
    dot.className       = "dot";
    statusText.textContent = msg || "Idle";
    statusText.style.color = "#555";
  }

  /* ── Safe restart ────────────────────────────────────────────── */
  function safeStart() {
    if (!recognition || isPlaying) return;
    clearTimeout(restartTimer);
    try { recognition.start(); } catch(e) { /* already running */ }
  }

  /* ── Build recognition object ────────────────────────────────── */
  function setupRecognition() {
    if (!SR) return;
    recognition = new SR();
    recognition.lang            = "en-US";
    recognition.continuous      = false;   // restart manually = more reliable
    recognition.interimResults  = false;
    recognition.maxAlternatives = 3;       // check up to 3 guesses per utterance

    recognition.onstart = () => {
      if (!isPlaying) setListening();
    };

    recognition.onresult = (event) => {
      /* Check all alternatives for any matching keyword */
      for (let alt = 0; alt < event.results[0].length; alt++) {
        const text = event.results[0][alt].transcript.trim().toLowerCase();

        for (let key in commands) {
          if (text.includes(key)) {
            transcript.textContent = `You said: "${text}"`;
            playAudio(commands[key], key);
            return;
          }
        }
      }

      /* No match across all alternatives — play default */
      const heard = event.results[0][0].transcript.trim();
      transcript.textContent = `You said: "${heard}" — no match`;
      playAudio(defaultAudio, null);
    };

    recognition.onerror = (event) => {
      /* Silently restart on non-fatal errors */
      if (event.error === "no-speech" || event.error === "aborted") {
        if (!isPlaying) restartTimer = setTimeout(safeStart, 100);
        return;
      }
      if (event.error === "not-allowed") {
        setIdle("Microphone access denied");
        return;
      }
      /* Any other error — retry after short delay */
      if (!isPlaying) restartTimer = setTimeout(safeStart, 400);
    };

    recognition.onend = () => {
      /* This fires after every recognition cycle — restart immediately */
      if (!isPlaying) restartTimer = setTimeout(safeStart, 80);
    };
  }

  /* ── Play audio ──────────────────────────────────────────────── */
  function playAudio(src, label) {
    isPlaying = true;
    clearTimeout(restartTimer);
    try { recognition.stop(); } catch(e) {}

    setPlaying(label);
    player.src = src;
    player.play().catch(() => {
      isPlaying = false;
      setIdle("Audio error — resuming mic");
      restartTimer = setTimeout(safeStart, 500);
    });
  }

  /* Restart mic the moment audio finishes */
  player.onended = () => {
    isPlaying = false;
    setListening();
    restartTimer = setTimeout(safeStart, 150);
  };

  player.onerror = () => {
    isPlaying = false;
    setIdle("File not found — resuming mic");
    restartTimer = setTimeout(safeStart, 500);
  };

  /* ── Init (triggered by button click) ───────────────────────── */
  function initVoice() {
    if (!SR) {
      alert("Web Speech API is not supported in this browser.\nTry Chrome or Edge.");
      return;
    }

    startBtn.disabled    = true;
    startBtn.textContent = "Mic active";

    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        /* Release the temporary stream — SpeechRecognition manages its own */
        stream.getTracks().forEach(t => t.stop());

        if (!started) {
          setupRecognition();
          started = true;
        }
        safeStart();
      })
      .catch(() => {
        setIdle("Microphone access denied");
        startBtn.disabled    = false;
        startBtn.textContent = "Start Listening";
      });
  }
</script>

</body>
</html>
